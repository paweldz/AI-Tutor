<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <title>GCSE Tutor Test</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
</head>
<body style="font-family:sans-serif;padding:40px">
  <h2>Loading test...</h2>
  <div id="status"></div>
  <div id="root"></div>

  <script>
    // Test 1: basic JS works
    document.getElementById('status').innerHTML += '<p>✅ JavaScript works</p>';

    // Test 2: React loaded
    if (window.React) document.getElementById('status').innerHTML += '<p>✅ React loaded</p>';
    else document.getElementById('status').innerHTML += '<p>❌ React failed to load</p>';

    // Test 3: ReactDOM loaded
    if (window.ReactDOM) document.getElementById('status').innerHTML += '<p>✅ ReactDOM loaded</p>';
    else document.getElementById('status').innerHTML += '<p>❌ ReactDOM failed to load</p>';
  </script>

  <script type="text/babel">
    // Test 4: Babel + React rendering
    function TestApp() {
      return <div style={{color:'green',marginTop:20}}><b>✅ Babel + React rendering works!</b></div>;
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TestApp/>);
  </script>

</body>
</html>
