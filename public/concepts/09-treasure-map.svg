<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Parchment map -->
  <g transform="translate(256,225)">
    <!-- Torn paper shape -->
    <path d="M-100,-120 L-95,-125 L-80,-118 L-60,-128 L-40,-115 L-20,-125 L0,-118 L20,-128 L40,-115 L60,-125 L80,-118 L95,-128 L100,-120
             L100,120 L95,125 L80,118 L60,128 L40,115 L20,125 L0,118 L-20,128 L-40,115 L-60,125 L-80,118 L-95,125 L-100,120 Z"
          fill="#f5e6c8" stroke="#d4b896" stroke-width="1.5"/>
    <!-- Map lines -->
    <path d="M-70,-60 Q-20,-90 30,-50 Q60,-30 40,20 Q20,50 -30,70" fill="none" stroke="#c4a070" stroke-width="2.5" stroke-dasharray="8,4"/>
    <path d="M-50,30 Q0,0 50,40" fill="none" stroke="#c4a070" stroke-width="2" stroke-dasharray="6,3"/>
    <!-- Dotted trail -->
    <circle cx="-60" cy="-50" r="3" fill="#c4a070"/>
    <circle cx="-35" cy="-65" r="3" fill="#c4a070"/>
    <circle cx="-5" cy="-60" r="3" fill="#c4a070"/>
    <circle cx="20" cy="-45" r="3" fill="#c4a070"/>
    <!-- X made of pencils -->
    <g transform="translate(45,0)">
      <!-- Pencil 1 -->
      <g transform="rotate(45)">
        <rect x="-5" y="-35" width="10" height="60" rx="1" fill="#f0c040"/>
        <polygon points="-5,25 5,25 0,38" fill="#ffeebb"/>
        <rect x="-5" y="-35" width="10" height="8" rx="1" fill="#e8555a"/>
        <polygon points="-5,25 5,25 0,35" fill="#444"/>
      </g>
      <!-- Pencil 2 -->
      <g transform="rotate(-45)">
        <rect x="-5" y="-35" width="10" height="60" rx="1" fill="#f0c040"/>
        <polygon points="-5,25 5,25 0,38" fill="#ffeebb"/>
        <rect x="-5" y="-35" width="10" height="8" rx="1" fill="#e8555a"/>
        <polygon points="-5,25 5,25 0,35" fill="#444"/>
      </g>
    </g>
    <!-- Compass rose tiny -->
    <g transform="translate(-65,60) scale(0.6)">
      <polygon points="0,-20 5,0 0,-5 -5,0" fill="#c4a070"/>
      <polygon points="0,20 5,0 0,5 -5,0" fill="#a08050"/>
      <polygon points="-20,0 0,5 -5,0 0,-5" fill="#a08050"/>
      <polygon points="20,0 0,5 5,0 0,-5" fill="#c4a070"/>
    </g>
  </g>
  <text x="256" y="440" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#fff">CHEATO</text>
</svg>
