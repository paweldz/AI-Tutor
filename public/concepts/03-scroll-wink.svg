<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Scroll -->
  <g transform="translate(256,220)">
    <!-- Scroll body -->
    <rect x="-90" y="-120" width="180" height="240" rx="8" fill="#f5f0e1"/>
    <!-- Top curl -->
    <ellipse cx="0" cy="-120" rx="100" ry="20" fill="#e8dcc8"/>
    <ellipse cx="0" cy="-120" rx="100" ry="14" fill="#f5f0e1"/>
    <!-- Bottom curl -->
    <ellipse cx="0" cy="120" rx="100" ry="20" fill="#e8dcc8"/>
    <ellipse cx="0" cy="120" rx="100" ry="14" fill="#f5f0e1"/>
    <!-- Winking face on scroll -->
    <!-- Open eye -->
    <circle cx="-30" cy="-20" r="16" fill="none" stroke="#1a1a2e" stroke-width="5"/>
    <circle cx="-30" cy="-20" r="6" fill="#1a1a2e"/>
    <!-- Winking eye -->
    <path d="M18,-25 Q38,-35 55,-25" fill="none" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>
    <!-- Cheeky smile -->
    <path d="M-30,20 Q0,55 40,20" fill="none" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>
    <!-- Tongue -->
    <path d="M10,32 Q15,48 25,32" fill="#e8555a" stroke="none"/>
  </g>
  <text x="256" y="435" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#fff">CHEATO</text>
</svg>
