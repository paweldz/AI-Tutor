<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Shuriken notebook -->
  <g transform="translate(256,230)">
    <!-- Four-pointed star shape -->
    <polygon points="0,-130 30,-30 130,0 30,30 0,130 -30,30 -130,0 -30,-30"
             fill="#f5f0e1" stroke="#d4cbb0" stroke-width="2.5"/>
    <!-- Spiral binding in center -->
    <circle cx="0" cy="0" r="25" fill="#2a2a4e" stroke="#444" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="#1a1a2e" stroke="#555" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#666"/>
    <!-- Lines on each blade -->
    <g stroke="#c8bfa8" stroke-width="2.5" stroke-linecap="round">
      <!-- Top blade -->
      <line x1="-15" y1="-50" x2="15" y2="-55"/>
      <line x1="-12" y1="-70" x2="12" y2="-75"/>
      <line x1="-8" y1="-90" x2="8" y2="-95"/>
      <!-- Right blade -->
      <line x1="50" y1="-15" x2="55" y2="15"/>
      <line x1="70" y1="-12" x2="75" y2="12"/>
      <line x1="90" y1="-8" x2="95" y2="8"/>
      <!-- Bottom blade -->
      <line x1="-15" y1="55" x2="15" y2="50"/>
      <line x1="-12" y1="75" x2="12" y2="70"/>
      <!-- Left blade -->
      <line x1="-55" y1="-15" x2="-50" y2="15"/>
      <line x1="-75" y1="-12" x2="-70" y2="12"/>
    </g>
  </g>
  <text x="256" y="440" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#f0c040">CHEATO</text>
</svg>
