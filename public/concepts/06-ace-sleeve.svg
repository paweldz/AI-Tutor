<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a472a"/>
      <stop offset="100%" stop-color="#0d2818"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sleeve -->
  <g transform="translate(256,260)">
    <!-- Arm/sleeve shape -->
    <path d="M-120,80 L-100,-60 C-95,-80 -60,-90 -40,-80 L40,-80 C60,-90 95,-80 100,-60 L120,80 Z" fill="#1a1a2e" stroke="#2a2a4e" stroke-width="2"/>
    <!-- Cuff -->
    <path d="M-120,80 Q0,55 120,80 Q0,105 -120,80" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
    <!-- Card sliding out -->
    <g transform="rotate(-10) translate(15,-140)">
      <rect x="-45" y="-65" width="90" height="130" rx="8" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
      <!-- Ace spade -->
      <text x="0" y="-30" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="28" fill="#e8555a">A</text>
      <!-- Spade symbol made with heart shape -->
      <g transform="translate(0,10)">
        <path d="M0,-22 C-20,-35 -35,-15 -20,5 L0,20 L20,5 C35,-15 20,-35 0,-22Z" fill="#e8555a" transform="rotate(180)"/>
        <rect x="-4" y="10" width="8" height="15" rx="2" fill="#e8555a"/>
      </g>
    </g>
  </g>
  <text x="256" y="445" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#f0c040">CHEATO</text>
</svg>
