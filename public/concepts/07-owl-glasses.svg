<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Owl body -->
  <g transform="translate(256,240)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="80" ry="90" fill="#fff"/>
    <!-- Chest pattern -->
    <ellipse cx="0" cy="50" rx="50" ry="60" fill="#f5f0e1"/>
    <!-- Head -->
    <circle cx="0" cy="-50" r="70" fill="#fff"/>
    <!-- Ear tufts -->
    <polygon points="-55,-100 -40,-70 -65,-70" fill="#fff"/>
    <polygon points="55,-100 40,-70 65,-70" fill="#fff"/>
    <!-- Glasses -->
    <circle cx="-25" cy="-50" r="30" fill="#1a1a2e" stroke="#333" stroke-width="5"/>
    <circle cx="25" cy="-50" r="30" fill="#1a1a2e" stroke="#333" stroke-width="5"/>
    <line x1="-5" y1="-55" x2="5" y2="-55" stroke="#333" stroke-width="5"/>
    <!-- Eyes behind glasses -->
    <circle cx="-25" cy="-50" r="12" fill="#fff"/>
    <circle cx="-22" cy="-50" r="6" fill="#1a1a2e"/>
    <circle cx="25" cy="-50" r="12" fill="#fff"/>
    <circle cx="28" cy="-50" r="6" fill="#1a1a2e"/>
    <!-- One eyebrow raised (smug) -->
    <line x1="10" y1="-85" x2="45" y2="-90" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <!-- Beak -->
    <polygon points="0,-30 -8,-20 8,-20" fill="#f0c040"/>
    <!-- Smug smirk -->
    <path d="M-12,-15 Q0,-8 15,-18" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="256" y="445" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#1a1a2e">CHEATO</text>
</svg>
