<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#302b63"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stars background -->
  <circle cx="80" cy="80" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="420" cy="60" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="350" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="400" cy="300" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="150" cy="150" r="1" fill="#fff" opacity="0.3"/>
  <!-- Pencil rocket -->
  <g transform="translate(256,230) rotate(-20)">
    <!-- Pencil body -->
    <rect x="-22" y="-100" width="44" height="160" rx="4" fill="#f0c040"/>
    <!-- Metal band -->
    <rect x="-22" y="40" width="44" height="20" fill="#d4a820"/>
    <!-- Tip -->
    <polygon points="-22,60 22,60 0,95" fill="#ffe8a0"/>
    <polygon points="-8,75 8,75 0,95" fill="#444"/>
    <!-- Eraser -->
    <rect x="-22" y="-115" width="44" height="20" rx="4" fill="#e8555a"/>
    <rect x="-22" y="-100" width="44" height="8" fill="#ccc"/>
    <!-- Flame -->
    <g filter="url(#glow)">
      <ellipse cx="0" cy="115" rx="18" ry="30" fill="#ff6b35" opacity="0.9"/>
      <ellipse cx="0" cy="110" rx="11" ry="22" fill="#ffd700" opacity="0.9"/>
      <ellipse cx="0" cy="108" rx="6" ry="15" fill="#fff" opacity="0.7"/>
    </g>
    <!-- Exhaust particles -->
    <circle cx="-10" cy="145" r="5" fill="#ff6b35" opacity="0.3"/>
    <circle cx="8" cy="155" r="4" fill="#ff6b35" opacity="0.2"/>
    <circle cx="-5" cy="165" r="3" fill="#ff6b35" opacity="0.15"/>
  </g>
  <text x="256" y="440" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#f0c040">CHEATO</text>
</svg>
