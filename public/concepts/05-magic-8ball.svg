<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#302b63"/>
    </linearGradient>
    <radialGradient id="ball" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 8 ball -->
  <circle cx="256" cy="230" r="140" fill="url(#ball)"/>
  <!-- Shine -->
  <ellipse cx="210" cy="170" rx="40" ry="25" fill="rgba(255,255,255,0.12)" transform="rotate(-20,210,170)"/>
  <!-- Blue triangle window -->
  <polygon points="256,160 310,250 202,250" fill="#1a3a6a" stroke="#2a5a9a" stroke-width="2"/>
  <!-- A+ text -->
  <text x="256" y="235" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="44" fill="#fff">A+</text>
  <!-- Number 8 at top -->
  <circle cx="256" cy="130" r="18" fill="#fff"/>
  <text x="256" y="138" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="24" fill="#111">8</text>
  <text x="256" y="440" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#f0c040">CHEATO</text>
</svg>
