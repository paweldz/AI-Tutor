<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141e30"/>
      <stop offset="100%" stop-color="#243b55"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="portal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#a78bfa"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Open book -->
  <g transform="translate(256,280)">
    <!-- Left page -->
    <path d="M-10,-20 L-10,-140 Q-60,-150 -120,-130 L-120,-10 Q-60,-30 -10,-20" fill="#f5f0e1" stroke="#d4cbb0" stroke-width="1.5"/>
    <!-- Right page -->
    <path d="M10,-20 L10,-140 Q60,-150 120,-130 L120,-10 Q60,-30 10,-20" fill="#f5f0e1" stroke="#d4cbb0" stroke-width="1.5"/>
    <!-- Spine -->
    <path d="M-10,-140 Q0,-145 10,-140 L10,-20 Q0,-15 -10,-20 Z" fill="#e8dcc8"/>
    <!-- Text lines left -->
    <line x1="-100" y1="-100" x2="-30" y2="-105" stroke="#ccc" stroke-width="2.5"/>
    <line x1="-100" y1="-80" x2="-25" y2="-84" stroke="#ccc" stroke-width="2.5"/>
    <line x1="-100" y1="-60" x2="-35" y2="-63" stroke="#ccc" stroke-width="2.5"/>
    <!-- Text lines right -->
    <line x1="30" y1="-105" x2="100" y2="-100" stroke="#ccc" stroke-width="2.5"/>
    <line x1="25" y1="-84" x2="100" y2="-80" stroke="#ccc" stroke-width="2.5"/>
    <line x1="35" y1="-63" x2="100" y2="-60" stroke="#ccc" stroke-width="2.5"/>
  </g>
  <!-- Portal vortex coming out of book -->
  <ellipse cx="256" cy="180" rx="90" ry="90" fill="url(#portal)" filter="url(#glow)"/>
  <!-- Spiral lines -->
  <g fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2">
    <path d="M256,180 Q280,150 270,120 Q260,95 235,105 Q215,115 225,140 Q235,160 256,155"/>
    <path d="M256,180 Q230,155 240,125 Q250,100 275,108 Q290,120 280,145"/>
  </g>
  <text x="256" y="445" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#a78bfa">CHEATO</text>
</svg>
