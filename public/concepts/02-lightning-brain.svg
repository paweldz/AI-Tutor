<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Brain outline -->
  <g transform="translate(256,230)" fill="none" stroke="#e0e0ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M-8,-100 C-60,-100 -110,-70 -110,-20 C-110,10 -90,30 -80,40 C-95,55 -100,75 -80,95 C-60,115 -30,110 -8,95"/>
    <path d="M-70,-60 C-85,-40 -85,-10 -70,5"/>
    <path d="M-55,30 C-70,45 -72,70 -55,85"/>
    <!-- Right hemisphere -->
    <path d="M8,-100 C60,-100 110,-70 110,-20 C110,10 90,30 80,40 C95,55 100,75 80,95 C60,115 30,110 8,95"/>
    <path d="M70,-60 C85,-40 85,-10 70,5"/>
    <path d="M55,30 C70,45 72,70 55,85"/>
    <!-- Center line -->
    <path d="M0,-100 L0,95"/>
  </g>
  <!-- Lightning bolt -->
  <g filter="url(#glow2)">
    <polygon points="280,80 235,210 270,210 220,340 320,190 280,190 330,80" fill="#f0c040" stroke="#ffd700" stroke-width="2"/>
  </g>
  <text x="256" y="440" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#f0c040">CHEATO</text>
</svg>
