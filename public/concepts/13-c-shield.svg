<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#302b63"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#d4a020"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Shield shape -->
  <g transform="translate(256,245)">
    <path d="M0,-145 L110,-100 L120,-20 Q120,80 0,150 Q-120,80 -120,-20 L-110,-100 Z"
          fill="url(#shield)" stroke="#c49010" stroke-width="3"/>
    <!-- Inner border -->
    <path d="M0,-125 L92,-85 L100,-18 Q100,65 0,128 Q-100,65 -100,-18 L-92,-85 Z"
          fill="none" stroke="#1a1a2e" stroke-width="4"/>
    <!-- Bold C -->
    <text x="0" y="30" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="160" fill="#1a1a2e">C</text>
    <!-- Graduation cap on top -->
    <g transform="translate(0,-150)">
      <polygon points="0,-25 55,0 0,25 -55,0" fill="#1a1a2e"/>
      <rect x="-20" y="-5" width="40" height="15" rx="2" fill="#1a1a2e"/>
      <line x1="50" y1="0" x2="50" y2="30" stroke="#1a1a2e" stroke-width="3"/>
      <circle cx="50" cy="32" r="5" fill="#f0c040"/>
    </g>
  </g>
  <text x="256" y="460" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="38" fill="#f0c040" letter-spacing="6">CHEATO</text>
</svg>
