<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Notebook -->
  <g transform="translate(256,225)">
    <rect x="-95" y="-130" width="190" height="260" rx="10" fill="#2a2a3e" stroke="#444" stroke-width="2"/>
    <!-- Spine rings -->
    <circle cx="-95" cy="-90" r="8" fill="none" stroke="#888" stroke-width="3"/>
    <circle cx="-95" cy="-40" r="8" fill="none" stroke="#888" stroke-width="3"/>
    <circle cx="-95" cy="10" r="8" fill="none" stroke="#888" stroke-width="3"/>
    <circle cx="-95" cy="60" r="8" fill="none" stroke="#888" stroke-width="3"/>
    <circle cx="-95" cy="110" r="8" fill="none" stroke="#888" stroke-width="3"/>
    <!-- TOP SECRET stamp -->
    <g transform="rotate(-15)">
      <rect x="-75" y="-45" width="150" height="50" rx="6" fill="none" stroke="#ef4444" stroke-width="5" opacity="0.9"/>
      <text x="0" y="-12" text-anchor="middle" font-family="Impact,sans-serif" font-size="30" fill="#ef4444" letter-spacing="3" opacity="0.9">TOP SECRET</text>
    </g>
    <!-- Glow from slightly open book -->
    <rect x="-95" y="100" width="190" height="30" rx="0" fill="none"/>
    <line x1="-85" y1="130" x2="85" y2="125" stroke="#f0c040" stroke-width="4" filter="url(#glow)" opacity="0.8"/>
    <line x1="-80" y1="130" x2="80" y2="126" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="256" y="440" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#ef4444">CHEATO</text>
</svg>
