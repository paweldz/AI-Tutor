<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Folded paper -->
  <g transform="translate(256,240)">
    <!-- Back fold shadow -->
    <path d="M-80,-120 L80,-120 L80,120 L-80,120 Z" fill="#e8e0d0" transform="rotate(-8) translate(-20,-10)" opacity="0.4"/>
    <!-- Main paper -->
    <path d="M-90,-110 L90,-110 L90,110 L-90,110 Z" fill="#f5f0e1" transform="rotate(3)"/>
    <!-- Fold triangle -->
    <path d="M90,-110 L40,-110 L90,-60 Z" fill="#d4cbb0" transform="rotate(3)"/>
    <!-- Crease lines -->
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#d4cbb0" stroke-width="1.5" stroke-dasharray="8,4" transform="rotate(3)"/>
    <line x1="0" y1="-90" x2="0" y2="90" stroke="#d4cbb0" stroke-width="1.5" stroke-dasharray="8,4" transform="rotate(3)"/>
    <!-- Tiny text lines -->
    <g transform="rotate(3)" fill="#b8a88a" font-size="9" font-family="monospace">
      <text x="-65" y="-75">E=mc²</text>
      <text x="-65" y="-60">∫f(x)dx</text>
      <text x="-65" y="-45">H₂O</text>
      <text x="10" y="-75">a²+b²=c²</text>
      <text x="10" y="-60">F=ma</text>
      <text x="-65" y="25">sin²+cos²=1</text>
      <text x="-65" y="40">PV=nRT</text>
      <text x="10" y="25">ΔG=ΔH-TΔS</text>
    </g>
  </g>
  <text x="256" y="430" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#f0c040">CHEATO</text>
</svg>
