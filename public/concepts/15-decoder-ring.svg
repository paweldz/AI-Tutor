<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#302b63"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#d4a020"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <g transform="translate(256,230)">
    <circle cx="0" cy="0" r="140" fill="url(#ring)" stroke="#c49010" stroke-width="2"/>
    <circle cx="0" cy="0" r="110" fill="#1a1a2e" stroke="#c49010" stroke-width="2"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="95" fill="#2a2a4e" stroke="#444" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="65" fill="#1a1a2e" stroke="#444" stroke-width="1.5"/>
    <!-- Letters around outer ring -->
    <g font-family="monospace" font-size="18" fill="#1a1a2e" font-weight="700">
      <text x="0" y="-120" text-anchor="middle">A</text>
      <text x="42" y="-113" text-anchor="middle">B</text>
      <text x="78" y="-95" text-anchor="middle">C</text>
      <text x="103" y="-68" text-anchor="middle">D</text>
      <text x="118" y="-35" text-anchor="middle">E</text>
      <text x="122" y="5" text-anchor="middle">F</text>
      <text x="115" y="42" text-anchor="middle">G</text>
      <text x="98" y="73" text-anchor="middle">H</text>
      <text x="73" y="98" text-anchor="middle">I</text>
      <text x="40" y="115" text-anchor="middle">J</text>
      <text x="3" y="123" text-anchor="middle">K</text>
      <text x="-35" y="118" text-anchor="middle">L</text>
      <text x="-68" y="103" text-anchor="middle">M</text>
      <text x="-93" y="78" text-anchor="middle">N</text>
      <text x="-110" y="45" text-anchor="middle">O</text>
      <text x="-120" y="8" text-anchor="middle">P</text>
      <text x="-118" y="-30" text-anchor="middle">Q</text>
      <text x="-105" y="-63" text-anchor="middle">R</text>
      <text x="-82" y="-90" text-anchor="middle">S</text>
      <text x="-48" y="-110" text-anchor="middle">T</text>
    </g>
    <!-- Symbols on inner ring -->
    <g font-family="monospace" font-size="16" fill="#a78bfa" font-weight="700">
      <text x="0" y="-75" text-anchor="middle">1</text>
      <text x="55" y="-52" text-anchor="middle">2</text>
      <text x="72" y="-5" text-anchor="middle">3</text>
      <text x="55" y="48" text-anchor="middle">4</text>
      <text x="3" y="80" text-anchor="middle">5</text>
      <text x="-50" y="52" text-anchor="middle">6</text>
      <text x="-72" y="-2" text-anchor="middle">7</text>
      <text x="-52" y="-52" text-anchor="middle">8</text>
    </g>
    <!-- Center pointer arrow -->
    <polygon points="0,-55 8,-10 -8,-10" fill="#f0c040" transform="rotate(35)"/>
    <circle cx="0" cy="0" r="12" fill="#f0c040" stroke="#c49010" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#1a1a2e"/>
  </g>
  <text x="256" y="445" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="42" fill="#f0c040">CHEATO</text>
</svg>
