<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Scroll / cheat-sheet body -->
  <rect x="126" y="100" width="260" height="312" rx="18" fill="#f5f0e1" stroke="#e0d8c4" stroke-width="4"/>
  <!-- Scroll curl top -->
  <path d="M126 118 Q126 100 144 100 L368 100 Q386 100 386 118" fill="none" stroke="#d4cbb0" stroke-width="3"/>
  <!-- Lined text rows -->
  <line x1="166" y1="168" x2="346" y2="168" stroke="#c8bfa8" stroke-width="5" stroke-linecap="round"/>
  <line x1="166" y1="208" x2="310" y2="208" stroke="#c8bfa8" stroke-width="5" stroke-linecap="round"/>
  <line x1="166" y1="248" x2="330" y2="248" stroke="#c8bfa8" stroke-width="5" stroke-linecap="round"/>
  <line x1="166" y1="288" x2="290" y2="288" stroke="#c8bfa8" stroke-width="5" stroke-linecap="round"/>
  <line x1="166" y1="328" x2="346" y2="328" stroke="#c8bfa8" stroke-width="5" stroke-linecap="round"/>
  <line x1="166" y1="368" x2="260" y2="368" stroke="#c8bfa8" stroke-width="5" stroke-linecap="round"/>
  <!-- Checkmarks on some lines (green) -->
  <path d="M152 165 l4 6 l8-10" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M152 245 l4 6 l8-10" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M152 325 l4 6 l8-10" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Graduation cap -->
  <polygon points="360,80 420,110 360,140 300,110" fill="#f0c040" stroke="#d4a820" stroke-width="2"/>
  <line x1="360" y1="140" x2="360" y2="170" stroke="#d4a820" stroke-width="3"/>
  <path d="M330 125 Q330 155 360 160 Q390 155 390 125" fill="none" stroke="#d4a820" stroke-width="2.5"/>
  <circle cx="360" cy="172" r="4" fill="#d4a820"/>
  <!-- "C" letter accent -->
  <text x="256" y="460" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="56" fill="#f0c040" letter-spacing="4">CHEATO</text>
</svg>
